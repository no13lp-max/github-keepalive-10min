name: GPT2API Render Ping

on:
  schedule:
    # 5 minutes is safer than 10 minutes due Actions queue jitter
    - cron: "*/5 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ping gpt2api Render
        env:
          TARGET_URL: ${{ secrets.TARGET_URL }}
          TIMEOUT_SECONDS: "25"
        run: |
          if [ -z "${TARGET_URL}" ]; then
            TARGET_URL="https://gpt2api-bridge.onrender.com/healthz"
          fi
          bash scripts/ping-gpt2api.sh
